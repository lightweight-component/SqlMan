    <style type="text/css">
        font {
            font-size: 12px;
        }

        .layui-layer-setwin .layui-layer-close1 {
            display: inline-block;
            margin: -19px auto;
            height: 44px;
            position: absolute;
            left: -26px;
            padding-left: 40px;
            background: url(image/ssov2.png) no-repeat;
            background-position: -158px 3px;
            font-size: 15px;
            cursor: pointer;
        }

        .initialize_pwd .phone-container {
            width: 100%;
            position: relative;
        }

        .initialize_pwd .btnSendVeryCode {
            position: absolute;
            top: -5px;
            right: 0;
            width: 80px;
            height: 32px;
            border: 0;
            color: #ffffff;
        }

        .change_pwd ul li input.btnSendVeryCode:hover {
            border: 0;
        }

        .change_pwd ul li input.btnSendVeryCode:focus {
            border: 0 !important;
        }

        #form-valid-error {
            color: red;
            height: 30px;
            text-align: center;
            padding-top: 10px;
            width: 90%;
            margin: 0 auto;
        }

        input.from-check-invalid {
            border: 1px solid red !important;
        }

        #pwdRule {
            width: 285px;
            margin: -15px auto 0;
            margin-left: 122px;
        }

        .reset-title {
            display: inline-block;
            font-size: 14px;
            width: 75px;
            text-align: right;

<body>
    <form method="post" id="initform" onsubmit="return false;">
        <!--修改密码-->
        <div class="change_pwd initialize_pwd">
            <!--	<span id="closeBtn" class="layui-layer-setwin">
                <a class="layui-layer-ico layui-layer-close layui-layer-close1" href="javascript:void(0);"></a>
            </span>-->
            <ul class="edit_psword" style="padding: 0; margin: 0 auto; width: 90%;">
                <p id="titleMsg" class="title_1"></p>
                <li><span class="reset-title" data-i18n-text="resetPwd02"></span><input type="password"
                        class="txt_input" id="oldPwd" name="oldPwd" data-i18n-placeholder="authApp099"
                        autocomplete="off" alt="" title=""></li>
                <li><span class="reset-title" data-i18n-text="resetPwd03"></span><input type="password"
                        class="txt_input" id="newPwd" name="newPwd" data-i18n-placeholder="authApp10" autocomplete="off"
                        alt="" title=""></li>
                <!--<span class="promptmsg">tips：密码需由8-16位数字、字母、特殊字符的两种或三种组成</span></li>-->
                <li>
                    <span class="reset-title" data-i18n-text="resetPwd04"></span>
                    <input type="password" class="txt_input" id="confirmNewPwd" name="confirmNewPwd" equalTo="#newPwd"
                        autocomplete="off" data-i18n-text="authApp111" alt="" title="">
                </li>
                <p id="pwdRule"></p>
            </ul>
        </div>
        <div id="form-valid-error"></div>
        <div class="dialog_layer_ft dialog_layer_ft1">
            <a href="javascript:void(0);" style="margin-left: 190px" class="btn btn_green btn-form" id="submitBtn">
                <span id="submitBtnTitle" data-i18n-text="authApp13"></span>
            </a>
        </div>
    </form>
