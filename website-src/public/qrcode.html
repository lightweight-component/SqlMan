<!DOCTYPE html>
<html lang="en">

<head>
    <%=require("./public/head.ejs")()%>
    <title>登录确认</title>
        <!--     <script type="text/javascript" src="./lib/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="./js/urlUtil.js"></script>
    <script type="text/javascript" src="./lib/dingtalk.open.js"></script> -->
</head>

<body>
    <div class="page login_page">
        <h2 id="title"></h2>
        <div class="list">
            <ul>
                <li>
                    <span>登录账号</span>
                    <span id="loginAccount"></span>
                </li>
                <li>
                    <span>IP地址</span>
                    <span id="ipAddress"></span>
                </li>
                <li>
                    <span>登录位置</span>
                    <span id="loginSeat"></span>
                </li>
                <li>
                    <span>登录时间</span>
                    <span id="loginTime"></span>
                </li>
            </ul>
            <div class="confirm_btn">
                <span onclick="confirm()">确认</span>
                <p onclick="cancel()">取消</p>
            </div>
        </div>
    </div>
</body>

</html>
