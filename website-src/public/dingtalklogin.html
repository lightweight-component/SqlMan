<body class="wechatbody">
    <input type="hidden" name="unionid" id="unionid" value="" />
    <input type="hidden" name="state" id="state" value="" />
    <div class="wechatmain-leftbk"></div>
    <div class="wechatmain-rightbk"></div>
    <div class="main">
        <div>
            <div class="watotherways-content">
                <!--邮件登录-->
                <div class="otherways-login" id="binding1">
                    <p class="title" style="margin-top: 70px;"><span data-i18n-text="login03"></span><i
                            class="app-name"><span data-i18n-text="dingtalk04"></span></i> <span
                            data-i18n-text="login04"></span></p>
                    <p><span data-i18n-text="dingtalk03"></span><i class="app-name"><span
                                data-i18n-text="dingtalk04"></span></i><span data-i18n-text="login04"></span></p>
                    <div class="login-input login-inputcutd ">
                        <span>
                            <input type="text" name="username" class="email-username"
                                data-i18n-placeholder="wechat11"><span class="countdown sendemail" style="top: 215px;"
                                data-i18n-text="wechat12"></span>
                        </span>
                        <span>
                            <input type="text" name="authCode" class="email-username" data-i18n-placeholder="wechat132">
                        </span>
                    </div>
                    <button class="submitButton i18n" data-index="email" name="authApp13"></button>
                </div>

                <!--短信登录-->
                <div class="otherways-login" id="binding2">
                    <p class="title" style="margin-top: 70px;"><span data-i18n-text="login03"></span><i
                            class="app-name"><span data-i18n-text="dingtalk04"></span></i> <span
                            data-i18n-text="login04"></span></p>
                    <p><span data-i18n-text="dingtalk03"></span><i class="app-name"><span
                                data-i18n-text="dingtalk04"></span></i><span data-i18n-text="login04"></span></p>
                    <div class="login-input login-inputcutd">
                        <span>
                            <input type="text" name="username" class="email-username i18n-input"
                                selectattr="data-i18n-msg" selectname="abmLogin032" data-i18n-msg="msg"
                                data-i18n-placeholder="abmLogin03">
                            <span class="countdown sendsms" style="top: 215px;" data-i18n-text="appLoginway15"></span>
                        </span>
                        <span>
                            <input type="text" name="authCode" class="email-username"
                                data-i18n-placeholder="appLoginway16">
                        </span>
                    </div>
                    <button class="submitButton i18n" data-index="phone" name="authApp13"></button>
                </div>

                <!--工号密码登录-->
                <div class="otherways-login" id="binding3">
                    <p class="title" style="margin-top: 70px;"><span data-i18n-text="login03">&nbsp;</span><i
                            class="app-name"><span data-i18n-text="dingtalk04"></span></i>&nbsp;<span
                            data-i18n-text="login044"></span></p>
                    <p><span data-i18n-text="dingtalk03"></span>&nbsp;<i class="app-name"><span
                                data-i18n-text="dingtalk04"></span></i>&nbsp;<span data-i18n-text="login044"></span></p>
                    <div class="login-input">
                        <span>
                            <input type="text" name="username" class="email-username"
                                data-i18n-placeholder="appLoginway05">
                        </span>
                        <span>
                            <input type="password" name="authCode" class="email-username"
                                data-i18n-placeholder="appLoginway29">
                        </span>
                    </div>
                    <button class="submitButton i18n" data-index="password" name="authApp13"></button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
