<body class="wechatbody">
    <div class="xd-ssov2header top-navbar">
        <h3 data-i18n-text="resetPwd11"></h3>
        <a href="./index.html" id="backBtn" class="iconfont ie8borderraidus">&#xe717;</a>
    </div>
    <div class="main mainpwd">
        <!-- <div> -->
        <div class="watotherways-content" style="text-align: left">
            <form method="post" id="resetPwdform" onsubmit="return false;">
                <input id="input-token" type="hidden" name="token">
                <input id="input-publicKey" type="hidden" name="publickKey">
                <input id="input-alg" type="hidden" name="alg">
                <!--修改密码-->
                <div class="change_pwd reset_pwd">
                    <p class="title" data-i18n-text="resetPwd01"></p>

                    <ul class="edit_psword">
                        <!--                        <li>-->
                        <!--                            <label data-i18n-text="login044"></label>-->
                        <!--                            <input type="text" class="txt_input" id="username" name="username"-->
                        <!--                                data-i18n-placeholder="resetPwd12">-->
                        <!--                        </li>-->
                        <li><label data-i18n-text="register10"></label>
                            <span class="item">
                                <input type="text" class="txt_input" id="empNum" name="empNum"
                                    data-i18n-placeholder="abmLogin03">
                                <input class="countdown pwdcountdown" type="button" data-i18n-value="abmLogin062"
                                    id="btnSendVeryCode" />
                            </span>
                            <label id="phone-error" class="error"></label>
                        </li>

                        <li>
                            <label>图形验证码</label>
                            <span class="item">
                                <input id="imageCaptchaValue" class="txt_input" type="text" placeholder="请输入图形验证码">
                                <img class="reset-pwd__captcha" id="imageCaptchaRender" src="" alt="加载失败"
                                    onclick="getImageCaptcha()">
                            </span>
                            <label id="captcha-error" class="error"></label>
                        </li>

                        <li><label data-i18n-text="resetPwd132"></label>
                            <span>
                                <input type="text" class="txt_input" id="checkCode" name="checkCode"
                                    data-i18n-placeholder="resetPwd14">
                            </span>

                        </li>
                        <li><label data-i18n-text="resetPwd15"></label>
                            <span>
                                <input type="password" class="txt_input" id="newPwd" name="newPwd"
                                    data-i18n-placeholder="authApp10">
                            </span>

                        </li>
                        <!--<span class="promptmsg">tips：密码需由8-16位数字、字母、特殊字符的两种或三种组成</span></li>-->
                        <li><label data-i18n-text="resetPwd162"></label>
                            <span>
                                <input type="password" class="txt_input" id="confirmNewPwd" name="confirmNewPwd"
                                    equalTo="#newPwd" data-i18n-placeholder="authApp111">
                        </li>
                        </span>
                        <p id="pwdRule"></p>
                    </ul>
                </div>
                <div class="dialog_layer_ft dialog_layer_ft1">
                    <a href="javascript:void(0);" class="btn btn_green btn-form" id="submitBtn"><span
                            data-i18n-text="authApp13"></span></a>
                </div>
            </form>

        </div>
        <!-- </div> -->
    </div>
</body>
